<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 2 - Datos y TXT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .output-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 8px;
            white-space: pre-wrap;
            min-height: 50px;
        }

        .data-display {
            margin-top: 2rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
        }

        .data-item {
            margin-bottom: 1rem;
        }

        .data-label {
            font-weight: bold;
            color: var(--primary-color);
            display: block;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">Página 1</a>
        <a href="pag2.html">Página 2</a>
        <a href="pag3.html">Página 3</a>
        <a href="pag4.html">Página 4</a>
        <a href="pag5.html">Página 5</a>
        <a href="pag6.html">Página 6</a>
        <a href="pag7.html">Página 7</a>
        <a href="pag8.html">Página 8</a>
    </nav>

    <main>
        <h1 style="text-align: center;">Carga de Datos y Archivo TXT</h1>
        <div class="card">
            <form id="form-pag2">
                <label>Email:</label>
                <input type="email" id="input-email" placeholder="ejemplo@correo.com" required>

                <label>Contraseña:</label>
                <input type="password" id="input-password" placeholder="••••••••" required>

                <label>Archivo de Texto (.txt):</label>
                <input type="file" id="txt-file" accept=".txt" required>

                <button type="submit">Enviar y Procesar</button>
                <button type="button" class="btn btn-clear"
                    onclick="clearContent(['input-email', 'input-password', 'txt-file'], ['display-email', 'display-password', 'display-txt'], ['submission-output'])">Limpiar
                    Contenido</button>
            </form>

            <div id="submission-output" class="data-display" style="display: none;">
                <h3>Datos Enviados:</h3>

                <div class="data-item">
                    <span class="data-label">Email:</span>
                    <div id="display-email" class="output-box" style="min-height: auto;"></div>
                </div>

                <div class="data-item">
                    <span class="data-label">Contraseña:</span>
                    <div id="display-password" class="output-box" style="min-height: auto;"></div>
                </div>

                <div class="data-item">
                    <span class="data-label">Contenido del archivo TXT:</span>
                    <div id="display-txt" class="output-box"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.getElementById('form-pag2').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            const fileInput = document.getElementById('txt-file');

            document.getElementById('display-email').textContent = email;
            document.getElementById('display-password').textContent = password;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    console.log("Contenido del archivo TXT:", content);
                    document.getElementById('display-txt').textContent = content;
                    document.getElementById('submission-output').style.display = 'block';

                    // Smooth scroll to results
                    document.getElementById('submission-output').scrollIntoView({ behavior: 'smooth' });
                };
                reader.readAsText(file);
            }
        });
    </script>
</body>

</html>
